<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login and Signup</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://kit.fontawesome.com/7871629ba5.js" crossorigin="anonymous"></script>
</head>

<body>

  <!-- login container -->
  <div class="container active" id="login-container">
    <h2>Login</h2>
    <form id="login-form">
      <div class="form-group">
        <input type="email" id="login-email" placeholder=" " required autocomplete="email">
        <label for="login-email">Email</label>
        <i class="fa-solid fa-envelope"></i>
      </div>

      <div class="form-group">
        <input type="password" id="login-password" placeholder=" " required autocomplete="current-password">
        <label for="login-password">Password</label>
        <i class="fa-solid fa-lock"></i>
      </div>

      <p><input type="checkbox">Remember me <a href="#">Forgot password?</a></p>
      <div id="login-message" class="message"></div>
      <button type="submit">Login</button>

      <p>Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
    </form>
  </div>

  <!-- signup container -->
  <div class="container" id="signup-container">
    <h2>SignUp</h2>
    <form id="signup-form">
      <div class="form-group">
        <input type="text" id="name" placeholder=" " required autocomplete="name">
        <label for="name">Name</label>
        <i class="fa-solid fa-circle-user"></i>
      </div>

      <div class="form-group">
        <input type="email" id="email" placeholder=" " required autocomplete="email">
        <label for="email">Email</label>
        <i class="fa-solid fa-envelope"></i>
      </div>

      <div class="form-group">
        <input type="password" id="password" placeholder=" " required autocomplete="new-password">
        <label for="password">Password</label>
        <i class="fa-solid fa-lock"></i>
      </div>

      <p><input type="checkbox">Remember me <a href="#">Forgot password?</a></p>
      <div class="message" id="signup-message"></div>
      <button type="submit">Signup</button>

      <p>Have an account? <a href="#" id="show-login">Login</a></p>
    </form>
  </div>

  <!-- Load your script as a module -->
  <script type="module" src="script.js"></script>
</body>
</html>
