<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Signup</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/7871629ba5.js" crossorigin="anonymous"></script>
</head>

<body>

<!-- login container -->
  <div class="container active" id="login-container">
    <h2>Login</h2>
    <form action="">
      <div class="form-group">
        <input type="email" id="email" placeholder=" " required>
        <label for="email">Email</label>


        <i class="fa-solid fa-envelope"></i>
      </div>

  
      <div class="form-group">
        <input type="password" id="password" placeholder=" " required>
        <label for="password">Password</label>

        <i class="fa-solid fa-lock"></i>
      </div>
      <p><input type="checkbox">Remember me <a href="#">Forgot password?</a></p> 
      <button type="submit">Login</button>

      <p>Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
    </form>
  </div>



<!-- sign up container -->
 <div class="container" id="signup-container">
    <h2>SignUp</h2>
    <form action="">

      <div class="form-group">
        <input type="text" id="name" placeholder=" " required>
        <label for="name">Name</label>
        <i class="fa-solid fa-circle-user"></i>
      </div>

      <div class="form-group">
        <input type="email" id="email" placeholder=" " required>
        <label for="email">Email</label>
        <i class="fa-solid fa-envelope"></i>
      </div>

  
      <div class="form-group">
        <input type="password" id="password" placeholder=" " required>
        <label for="password">Password</label>

        <i class="fa-solid fa-lock"></i>
      </div>
      <p><input type="checkbox">Remember me <a href="#">Forgot password?</a></p> 
      <button type="submit">Signup</button>

      <p>Have an account? <a href="#" id="show-login">Login</a></p>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
